name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Pages 未設定だと GET が 404 になるため、初回は自動有効化を試す
      - uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Prepare site
        run: |
          mkdir _site
          cp index.html app.js style.css icon.svg sw.js manifest.webmanifest .nojekyll _site/
          cp -r vendor models _site/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v5
